name: Update CRDs

on:
  schedule:
    # 07:00 CET (UTC+1) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: {}

jobs:
  update-crds:
    name: Check and update CRDs from upstream
    runs-on: ubuntu-latest
    if: github.repository == 'openshift-virtualization/virt-platform-autopilot'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Verify CRDs are up-to-date
        id: verify
        run: |
          if make verify-crds; then
            echo "up_to_date=true" >> "${GITHUB_OUTPUT}"
          else
            echo "up_to_date=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update CRDs from upstream
        if: steps.verify.outputs.up_to_date == 'false'
        run: make update-crds

      - name: Detect changed CRDs
        if: steps.verify.outputs.up_to_date == 'false'
        id: changes
        run: |
          changed_files=$(git diff --name-only -- 'test/crds/' | sort)
          if [ -z "$changed_files" ]; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
          else
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            # Build a markdown list of changed files for the PR body
            changed_list=$(echo "$changed_files" | sed 's/^/- /')
            # Store multi-line output safely
            {
              echo "changed_list<<EOF"
              echo "$changed_list"
              echo "EOF"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Check for existing open CRD update PR
        if: steps.verify.outputs.up_to_date == 'false' && steps.changes.outputs.has_changes == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          existing_branch=$(gh pr list --label "automated,crds" --state open --json headRefName --jq '.[0].headRefName // ""')
          if [ -n "$existing_branch" ]; then
            echo "branch=$existing_branch" >> "${GITHUB_OUTPUT}"
          fi

      - name: Update existing PR branch
        if: steps.verify.outputs.up_to_date == 'false' && steps.changes.outputs.has_changes == 'true' && steps.existing_pr.outputs.branch != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # The updated CRDs are in the working tree but not committed.
          # Copy them aside, reset the working tree, switch to the existing PR
          # branch, then restore so we can commit the freshest upstream state.
          tmpdir=$(mktemp -d)
          cp -r test/crds/. "$tmpdir/"
          git checkout -- test/crds/

          git fetch origin "${{ steps.existing_pr.outputs.branch }}"
          git checkout "${{ steps.existing_pr.outputs.branch }}"

          cp -r "$tmpdir/." test/crds/
          rm -rf "$tmpdir"

          changed_files=$(git diff --name-only -- 'test/crds/' | sort)
          if [ -z "$changed_files" ]; then
            echo "Existing PR already contains all current CRD changes, nothing to add."
            exit 0
          fi
          commit_body=$(echo "$changed_files" | sed 's/^/- /')

          git add test/crds/
          printf 'chore: update CRDs from upstream\n\nUpdated CRD files:\n%s\n' "$commit_body" | git commit -F -
          git push origin "${{ steps.existing_pr.outputs.branch }}"

      - name: Create branch and open PR
        if: steps.verify.outputs.up_to_date == 'false' && steps.changes.outputs.has_changes == 'true' && steps.existing_pr.outputs.branch == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANGED_LIST: ${{ steps.changes.outputs.changed_list }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          branch="auto/update-crds-$(date -u +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch"

          # Build commit message with list of updated CRDs
          changed_files=$(git diff --name-only -- 'test/crds/' | sort)
          commit_body=$(echo "$changed_files" | sed 's/^/- /')

          git add test/crds/
          printf 'chore: update CRDs from upstream\n\nUpdated CRD files:\n%s\n' "$commit_body" | git commit -F -

          git push origin "$branch"

          # Write PR body to a temp file to avoid shell quoting / YAML issues
          pr_body_file=$(mktemp)
          cat > "$pr_body_file" << 'PRBODY_EOF'
          ## Automated CRD Update

          This PR was opened automatically by the daily CRD sync workflow.

          The following CRD files were found to be out of sync with their upstream sources and have been updated:
          PRBODY_EOF
          printf '\n%s\n' "$CHANGED_LIST" >> "$pr_body_file"
          cat >> "$pr_body_file" << 'PRBODY_EOF'

          ### How to verify

          ```bash
          make verify-crds
          ```

          ---
          PRBODY_EOF
          printf '*Generated by the [Update CRDs](%s) workflow.*\n' "$RUN_URL" >> "$pr_body_file"

          gh pr create \
            --title "chore: update CRDs from upstream ($(date -u +%Y-%m-%d))" \
            --body-file "$pr_body_file" \
            --base main \
            --head "$branch" \
            --label "automated,crds"
          rm -f "$pr_body_file"
