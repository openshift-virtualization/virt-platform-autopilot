name: Comment on PR Verification Failure

# This workflow runs in the BASE REPO context (not the fork), so GITHUB_TOKEN
# has pull-requests: write access even for cross-repository (fork) PRs.
# It is intentionally separate from verify-generated.yml, which runs with
# pull_request (read-only for forks) for security isolation.
on:
  workflow_run:
    workflows: ["Verify Generated Files"]
    types: [completed]

jobs:
  comment:
    name: Post failure comment on PR
    runs-on: ubuntu-latest
    # Only comment when verification failed on a PR (not a push to main)
    if: |
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Download PR number artifact
        uses: actions/download-artifact@v8
        with:
          name: pr-number
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt(fs.readFileSync('pr_number.txt', 'utf8').trim());
            if (isNaN(prNumber)) {
              console.log('No valid PR number found, skipping comment.');
              return;
            }
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Generated Files Verification Failed**\n\nOne or more generated files in this PR are out of sync:\n\n- **CRDs**: Run `make update-crds` if CRD verification failed\n- **RBAC**: Run `make generate-rbac` if RBAC verification failed\n\nPlease regenerate the files locally and commit the changes.'
            });
