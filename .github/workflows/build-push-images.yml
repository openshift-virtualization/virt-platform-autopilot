name: Build and Push Multi-Arch Images

on:
  push:
    branches:
      - main
      - release-*
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**.md'

jobs:
  build-push-multi-arch:
    name: Build and push multi-arch operator image
    runs-on: ubuntu-latest
    if: github.repository == 'openshift-virtualization/virt-platform-autopilot'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "${GITHUB_OUTPUT}"
          else
            echo "value=$(date -u +%Y%m%d-%H%M%S)" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up QEMU for cross-platform builds
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Log in to Quay.io
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push multi-arch operator image
        run: make build-push-multi-arch
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}

      - name: Retag as latest
        if: github.ref == 'refs/heads/main'
        run: |
          docker buildx imagetools create \
            --tag quay.io/openshift-virtualization/virt-platform-autopilot:latest \
            quay.io/openshift-virtualization/virt-platform-autopilot:${{ steps.tag.outputs.value }}

