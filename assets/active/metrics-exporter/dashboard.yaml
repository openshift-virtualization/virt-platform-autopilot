apiVersion: perses.dev/v1alpha2
kind: PersesDatasource
metadata:
  name: thanos-querier
  namespace: kubevirt-metrics-exporter
  labels:
    app: kubevirt-metrics-exporter
spec:
  config:
    display:
      name: "Thanos Querier"
    default: true
    plugin:
      kind: "PrometheusDatasource"
      spec:
        proxy:
          kind: HTTPProxy
          spec:
            url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
            secret: thanos-querier-secret
  client:
    tls:
      enable: true
      caCert:
        type: file
        certPath: /ca/service-ca.crt
---
apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  name: kubevirt-metrics-exporter
  namespace: kubevirt-metrics-exporter
  labels:
    app: kubevirt-metrics-exporter
spec:
  config:
    display:
      name: KubeVirt Storage Latency
      description: Storage I/O latency from QMP and eBPF subsystems
    duration: 1h


    variables:
      - kind: ListVariable
        spec:
          name: node
          display:
            name: Node
          defaultValue:
            - "$__all"
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: node
              matchers:
                - "kube_node_info{}"

      - kind: ListVariable
        spec:
          name: namespace
          display:
            name: Namespace
          defaultValue:
            - "$__all"
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: namespace
              matchers:
                - "kube_namespace_labels{}"

      - kind: ListVariable
        spec:
          name: vmi
          display:
            name: VMI
          defaultValue:
            - "$__all"
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: name
              matchers:
                - 'kubevirt_vmi_info{node=~"$node", namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: persistentvolumeclaim
          display:
            name: Volume
          defaultValue:
            - "$__all"
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: PrometheusLabelValuesVariable
            spec:
              datasource:
                kind: PrometheusDatasource
                name: thanos-querier
              labelName: persistentvolumeclaim
              matchers:
                - 'kube_persistentvolumeclaim_info{namespace=~"$namespace"}'

      - kind: ListVariable
        spec:
          name: operation
          display:
            name: Operation
          defaultValue:
            - "$__all"
          allowAllValue: true
          allowMultiple: true
          customAllValue: ".*"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - read
                - write
                - flush
                - discard
                - open
                - getattr

      - kind: ListVariable
        spec:
          name: interval
          display:
            name: Rate Interval
          allowAllValue: false
          allowMultiple: false
          defaultValue: "5m"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - "1m"
                - "2m"
                - "5m"
                - "10m"

      - kind: ListVariable
        spec:
          name: topk
          display:
            name: Limit
          allowAllValue: false
          allowMultiple: false
          defaultValue: "25"
          plugin:
            kind: StaticListVariable
            spec:
              values:
                - "10"
                - "25"
                - "50"
                - "100"

    panels:
      qmp_ratio:
        kind: Panel
        spec:
          display:
            name: QEMU to Device
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                format:
                  unit: percent
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, clamp_min((sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="0.01", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100, 0))'
                    minStep: "30s"
                    seriesNameFormat: "> 10ms ({{name}} / {{disk}})"
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, clamp_min((sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="0.1", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100, 0))'
                    minStep: "30s"
                    seriesNameFormat: "> 100ms ({{name}} / {{disk}})"
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, clamp_min((sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) - sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{le="1", node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))) / sum by (name, disk) (rate(kubevirt_vmi_storage_io_latency_seconds_count{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval])) * 100, 0))'
                    minStep: "30s"
                    seriesNameFormat: "> 1s ({{name}} / {{disk}})"

      qmp_p99:
        kind: Panel
        spec:
          display:
            name: QEMU to Device (p99)
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
