                      name: thanos-querier
                    query: 'topk($topk, histogram_quantile(0.99, sum by (name, disk, le) (rate(kubevirt_vmi_storage_io_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]))))'
                    minStep: "30s"
