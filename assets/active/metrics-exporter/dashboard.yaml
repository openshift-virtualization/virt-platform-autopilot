                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, histogram_quantile(0.99, sum by (name, persistentvolumeclaim, le) (rate(kme_nfs_vfs_latency_seconds_bucket{node=~"$node", namespace=~"$namespace", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"}[$interval]) * on(namespace, pod) group_left(name) label_replace(kubevirt_vmi_info{name=~"$vmi", node=~"$node"}, "pod", "$1", "vmi_pod", "(.*)"))))'
                    minStep: "30s"
                    seriesNameFormat: "{{name}} / {{persistentvolumeclaim}}"

      qga_latency:
        kind: Panel
        spec:
          display:
            name: Windows Guest to Device
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                format:
                  unit: seconds
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, kubevirt_vmi_storage_guest_latency_avg_seconds{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"})'
                    minStep: "30s"
                    seriesNameFormat: "{{name}} / {{disk}} ({{drive}} {{operation}})"

      qga_iops:
        kind: Panel
        spec:
          display:
            name: Windows Guest IOPs
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                label: IOPs
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, kubevirt_vmi_storage_guest_iops{node=~"$node", namespace=~"$namespace", name=~"$vmi", operation=~"$operation", persistentvolumeclaim=~"$persistentvolumeclaim"})'
                    minStep: "30s"
                    seriesNameFormat: "{{name}} / {{disk}} ({{drive}} {{operation}})"

      virtqueue_utilization:
        kind: Panel
        spec:
          display:
            name: Virtqueue Utilization
          plugin:
            kind: TimeSeriesChart
            spec:
              yAxis:
                show: true
                format:
                  unit: percent
              legend:
                position: bottom
                mode: table
          queries:
            - kind: TimeSeriesQuery
              spec:
                plugin:
                  kind: PrometheusTimeSeriesQuery
                  spec:
                    datasource:
                      kind: PrometheusDatasource
                      name: thanos-querier
                    query: 'topk($topk, sum by (name, disk) (kubevirt_vmi_storage_queue_inuse{node=~"$node", namespace=~"$namespace", name=~"$vmi", persistentvolumeclaim=~"$persistentvolumeclaim"}) / (sum by (name, disk) (kubevirt_vmi_storage_queue_size{node=~"$node", namespace=~"$namespace", name=~"$vmi", persistentvolumeclaim=~"$persistentvolumeclaim"}) > 0) * 100)'
                    minStep: "30s"
                    seriesNameFormat: "{{name}} / {{disk}}"

    layouts:
      - kind: Grid
        spec:
          display:
            title: QEMU to Device
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/qmp_ratio'
            - x: 12
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/qmp_p99'

      - kind: Grid
        spec:
          display:
            title: Windows Guest (QGA)
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/qga_latency'
            - x: 12
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/qga_iops'

      - kind: Grid
        spec:
          display:
            title: Virtqueue Utilization
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 24
              height: 12
              content:
                $ref: '#/spec/panels/virtqueue_utilization'

      - kind: Grid
        spec:
          display:
            title: Kernel to Device
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/block_ratio'
            - x: 12
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/block_p99'

      - kind: Grid
        spec:
          display:
            title: NFS Client to Server
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/nfs_ratio'
            - x: 12
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/nfs_p99'

      - kind: Grid
        spec:
          display:
            title: VFS to NFS Server
            collapse:
              open: true
          items:
            - x: 0
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/nfs_vfs_ratio'
            - x: 12
              "y": 0
              width: 12
              height: 12
              content:
                $ref: '#/spec/panels/nfs_vfs_p99'
