  - name: logging-collector-crb-audit
    group: audit-logging
    path: active/logging/collector-crb-audit.yaml
    phase: 1
    install: opt-in
    component: ClusterRoleBinding
    reconcile_order: 2
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-audit-logging
        value: "true"

  - name: logging-collector
    group: logging
    gate_crd: clusterlogforwarders.observability.openshift.io
    path: active/logging/clusterlogforwarder.yaml.tpl
    phase: 1
    install: opt-in
    component: ClusterLogForwarder
    reconcile_order: 3
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  - name: logging-ui-plugin
    group: logging
    path: active/operators/logging-uiplugin.yaml
    phase: 1
    install: opt-in
    component: UIPlugin
    reconcile_order: 3
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  # Phase 1: Auto-enabled when Descheduler CRD is present (soft dependency)
  - name: descheduler-loadaware
    path: active/descheduler/recommended.yaml.tpl
    phase: 1
