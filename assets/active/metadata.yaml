# Asset catalog defining what to manage
# CRITICAL: HCO must be first - it's applied first, then read for RenderContext
assets:
  # Phase 0: HCO Golden Reference (Always, managed first!)
  - name: hco-golden-config
    path: active/hco/golden-config.yaml.tpl
    phase: 0
    install: always
    component: HyperConverged
    reconcile_order: 0
    conditions: []

  # Phase 1: Observability - metrics Service, ServiceMonitor, and PrometheusRule for alerts
  # Soft dependency: ServiceMonitor and PrometheusRule will be skipped gracefully
  # if Prometheus Operator CRD is not installed
  - name: metrics-service
    path: active/observability/metrics-service.yaml.tpl
    phase: 1
    install: always
    component: Service
    reconcile_order: 1
    conditions: []

  - name: metrics-servicemonitor
    path: active/observability/servicemonitor.yaml.tpl
    phase: 1
    install: always
    component: ServiceMonitor
    reconcile_order: 1
    conditions: []

  - name: prometheus-alerts
    path: active/observability/prometheus-rules.yaml.tpl
    phase: 1
    install: always
    component: PrometheusRule
    reconcile_order: 1
    conditions: []

  # Phase 1: MachineConfig (requires MachineConfig CRD)
  - name: swap-enable
    path: active/machine-config/01-swap-enable.yaml.tpl
    phase: 1
    install: always
    component: MachineConfig
    reconcile_order: 1
    conditions: []

  - name: pci-passthrough
    path: active/machine-config/02-pci-passthrough.yaml.tpl
    phase: 1
    install: opt-in
    component: MachineConfig
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/openshift
        value: "true"
      - type: hardware-detection
        detector: pciDevicesPresent

  - name: psi-enable
    group: descheduler-loadaware
    gate_crd: kubedeschedulers.operator.openshift.io
    path: active/machine-config/04-psi-enable.yaml
    phase: 1
    install: always
    component: MachineConfig
    reconcile_order: 1

  # Phase 1: OpenShift Kubelet (soft dependency on KubeletConfig CRD)
  - name: kubelet-perf-settings
    path: active/kubelet/perf-settings.yaml.tpl
    phase: 1
    install: always
    component: KubeletConfig
    reconcile_order: 1

  # Phase 1: Optional Operators (opt-in for clusters with CRDs)
  - name: mtv-operator
    path: active/operators/mtv.yaml.tpl
    phase: 1
    install: opt-in
    component: ForkliftController
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-mtv
        value: "true"

  - name: metallb-operator
    path: active/operators/metallb.yaml.tpl
    phase: 1
    install: opt-in
    component: MetalLB
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-metallb
        value: "true"

  # Phase 1: Monitoring UI Plugin - enables Perses and optionally incident detection
  # in the OpenShift console (COO).
  # Soft dependency: skipped if COO (uiplugins.observability.openshift.io CRD) is absent.
  # When ACM is present it manages the same 'monitoring' UIPlugin and adds acm.* fields;
  # SSA field managers don't conflict because autopilot owns spec.monitoring.perses
  # and spec.monitoring.incidents (when enabled).
  # Incident detection is opt-in via:
  #   platform.kubevirt.io/enable-incident-detection=true
  - name: monitoring-ui-plugin
    path: active/operators/monitoring-uiplugin.yaml.tpl
    phase: 1
    install: always
    component: UIPlugin
    reconcile_order: 1
    conditions: []

  # Phase 1: Troubleshooting Panel (korrel8r) - enables observability signal correlation.
  # Provides a side-panel in the console that links metrics, logs, alerts, traces,
  # and Kubernetes resources for cross-signal navigation.
  # Opt-in via: platform.kubevirt.io/enable-korrel8r=true
  - name: troubleshooting-panel-ui-plugin
    path: active/operators/troubleshooting-panel-uiplugin.yaml
    phase: 1
    install: opt-in
    component: UIPlugin
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-korrel8r
        value: "true"

  # Phase 1: Logging stack - configures LokiStack, ClusterLogForwarder,
  # and Logging UI Plugin.
  # Opt-in: requires annotation. Prerequisites:
  #   1. Install Loki Operator and Red Hat OpenShift Logging Operator (via OLM)
  #   2. Create storage secret (logging-loki-storage) in openshift-logging
  # LokiStack size is dynamic based on cluster topology (pico/extra-small/medium).
  # Grouped under "logging" for selective allowlist activation.
  #
  # Audit log collection is separately opt-in via:
  #   platform.kubevirt.io/enable-audit-logging=true
  # When enabled, the ClusterLogForwarder adds an audit pipeline with production
  # filters that reduce volume by ~95% (drop non-complete stages, system users,
  # and noisy verbs like watch/proxy).
  - name: logging-lokistack
    group: logging
    gate_crd: lokistacks.loki.grafana.com
    path: active/logging/lokistack.yaml.tpl
    phase: 1
    install: opt-in
    component: LokiStack
    reconcile_order: 2
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  - name: logging-collector-sa
    group: logging
    path: active/logging/collector-sa.yaml
    phase: 1
    install: opt-in
    component: ServiceAccount
    reconcile_order: 2
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  - name: logging-collector-crb-application
    group: logging
    path: active/logging/collector-crb-application.yaml
    phase: 1
    install: opt-in
    component: ClusterRoleBinding
    reconcile_order: 2
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  - name: logging-collector-crb-infrastructure
    group: logging
    path: active/logging/collector-crb-infrastructure.yaml
    phase: 1
    install: opt-in
    component: ClusterRoleBinding
    reconcile_order: 2
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-logging
        value: "true"

  - name: logging-collector-crb-writer
    group: logging
    path: active/logging/collector-crb-writer.yaml
