# Asset catalog defining what to manage
# CRITICAL: HCO must be first - it's applied first, then read for RenderContext
assets:
  # Phase 0: HCO Golden Reference (Always, managed first!)
  - name: hco-golden-config
    path: active/hco/golden-config.yaml.tpl
    phase: 0
    install: always
    component: HyperConverged
    reconcile_order: 0
    conditions: []

  # Phase 1: Critical monitoring - PrometheusRule for alerts (reconciled first after HCO)
  # Soft dependency: Will be skipped gracefully if Prometheus Operator CRD is not installed
  - name: prometheus-alerts
    path: active/observability/prometheus-rules.yaml.tpl
    phase: 1
    install: always
    component: PrometheusRule
    reconcile_order: 1
    conditions: []

  # Phase 1: MachineConfig (requires MachineConfig CRD)
  - name: swap-enable
    path: active/machine-config/01-swap-enable.yaml
    phase: 1
    install: always
    component: MachineConfig
    reconcile_order: 1
    conditions: []

  - name: pci-passthrough
    path: active/machine-config/02-pci-passthrough.yaml.tpl
    phase: 1
    install: opt-in
    component: MachineConfig
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/openshift
        value: "true"
      - type: hardware-detection
        detector: pciDevicesPresent

  - name: psi-enable
    group: descheduler-loadaware
    gate_crd: kubedeschedulers.operator.openshift.io
    path: active/machine-config/04-psi-enable.yaml
    phase: 1
    install: always
    component: MachineConfig
    reconcile_order: 1

  # Phase 1: OpenShift Kubelet (soft dependency on KubeletConfig CRD)
  - name: kubelet-perf-settings
    path: active/kubelet/perf-settings.yaml.tpl
    phase: 1
    install: always
    component: KubeletConfig
    reconcile_order: 1

  # Phase 1: Always installed - NodeHealthCheck
  - name: node-health-check
    path: active/node-health/standard-remediation.yaml
    phase: 1
    install: always
    component: NodeHealthCheck
    reconcile_order: 1
    conditions: []

  # Phase 1: Optional Operators (opt-in for clusters with CRDs)
  - name: mtv-operator
    path: active/operators/mtv.yaml.tpl
    phase: 1
    install: opt-in
    component: ForkliftController
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-mtv
        value: "true"

  - name: metallb-operator
    path: active/operators/metallb.yaml.tpl
    phase: 1
    install: opt-in
    component: MetalLB
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-metallb
        value: "true"

  - name: observability-operator
    path: active/operators/observability.yaml.tpl
    phase: 1
    install: opt-in
    component: UIPlugin
    reconcile_order: 1
    conditions:
      - type: annotation
        key: platform.kubevirt.io/enable-observability
        value: "true"

  # Phase 1: Auto-enabled when Descheduler CRD is present (soft dependency)
  - name: descheduler-loadaware
    path: active/descheduler/recommended.yaml.tpl
    phase: 1
    install: always
    component: KubeDescheduler
    reconcile_order: 1
    conditions: []

  # Phase 1: Opt-in - CPU Manager
  - name: kubelet-cpu-manager
    path: active/kubelet/cpu-manager.yaml.tpl
    phase: 1
    install: opt-in
    component: KubeletConfig
    reconcile_order: 1
    conditions:
      - type: feature-gate
        value: CPUManager

  # Phase 2: InflightOperations OperationRuleSet assets (opt-in, gated on IFO CRD)
  - name: ifo-datavolume-rules
    group: inflightoperations
    gate_crd: operationrulesets.ifo.kubevirt.io
    path: active/inflightoperations/cdi/datavolume_operationrule.yaml
    phase: 2
    install: always
    component: OperationRuleSet
    reconcile_order: 20
